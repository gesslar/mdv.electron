name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Check version
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - id: read
        name: Read version from package.json
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "package.json version: $version"
      - id: check
        name: Check if release already exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.read.outputs.version }}"
          if gh release view "$tag" --json id >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to do."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag does not exist — proceeding."
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: gate
    if: needs.gate.outputs.should-release == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: deb
            runner: ubuntu-latest
            artifact-path: out/*.deb
            needs-rpmbuild: false
          - target: rpm
            runner: ubuntu-latest
            artifact-path: out/*.rpm
            needs-rpmbuild: true
          - target: appimage
            runner: ubuntu-latest
            artifact-path: out/*.AppImage
            needs-rpmbuild: false
          - target: flatpak
            runner: ubuntu-latest
            artifact-path: out/*.flatpak
            needs-rpmbuild: false
          - target: win
            runner: ubuntu-latest
            artifact-path: |
              out/*.exe
              out/*.exe.blockmap
              out/latest.yml
            needs-rpmbuild: false
          - target: mac
            runner: macos-latest
            artifact-path: |
              out/*.zip
              out/*.zip.blockmap
              out/latest-mac.yml
            needs-rpmbuild: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - name: Install rpmbuild
        # fpm shells out to rpmbuild when producing .rpm. libcrypt.so.1 (used
        # by fpm's bundled ruby) is already on stock ubuntu-latest via
        # libcrypt1; on Fedora hosts you'd need libxcrypt-compat — see
        # DEVELOPMENT.md.
        if: matrix.needs-rpmbuild
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
      - name: Cache flatpak runtimes
        # Pinned to runtime-version 24.08 in build/flatpak/dev.gesslar.mdv.yml.
        # Bump the cache key suffix when bumping the runtime so old caches are
        # not restored after a version change.
        if: matrix.target == 'flatpak'
        uses: actions/cache@v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtimes-24.08-v1
      - name: Install flatpak toolchain
        # flatpak-builder shells out to the foreign-arch SDK to run build
        # commands; without qemu binfmt registered, the aarch64 leg fails with
        # "bwrap: execvp /bin/sh: Exec format error". docker/setup-qemu-action
        # registers binfmt_misc handlers host-wide, which bwrap inherits.
        if: matrix.target == 'flatpak'
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          for arch in x86_64 aarch64; do
            flatpak install --user -y --noninteractive --arch=$arch flathub \
              org.freedesktop.Platform//24.08 \
              org.freedesktop.Sdk//24.08 \
              org.electronjs.Electron2.BaseApp//24.08
          done
      - uses: docker/setup-qemu-action@v4
        if: matrix.target == 'flatpak'
        with:
          platforms: arm64
      - name: Install wine
        # NSIS itself runs native (linux ELF makensis), but electron-builder
        # still uses winCodeSign under wine for PE header manipulation (asar
        # integrity hash, fuses, icon resources) on the bundled mdv.exe — for
        # every Windows build, signed or not.
        if: matrix.target == 'win'
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y wine wine32
      - run: npm ci
      - run: npm run dist:${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  publish:
    name: Publish draft release
    needs: [gate, build]
    if: needs.gate.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ needs.gate.outputs.version }}"
          gh release create "$tag" \
            --draft \
            --title "$tag" \
            --notes "Draft release for $tag. Review and publish when ready."
      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ needs.gate.outputs.version }}"
          find artifacts -type f -print0 | xargs -0 gh release upload "$tag"
      - name: Summary
        run: |
          {
            echo "### Draft release v${{ needs.gate.outputs.version }} created"
            echo ""
            echo "Review at https://github.com/${{ github.repository }}/releases"
          } >> "$GITHUB_STEP_SUMMARY"
