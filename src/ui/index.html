<!DOCTYPE html>
<html lang="en" class="h-full forced-color-adjust-auto">

<head>
  <meta charset="UTF-8">
  <title>mdv</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="manifest" href="assets/icons/site.webmanifest">

  <link rel="stylesheet" href="css/mdv.css">
  <link id="hljs-theme" rel="stylesheet">

  <script>
    // Resolve theme and set the hljs stylesheet href before first paint, so
    // the correct syntax-highlight palette loads on cold start (no flash).
    const saved = localStorage.getItem("mdv-theme") || "auto"
    let theme
    if (saved === "light" || saved === "dark") {
      theme = saved
    } else {
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
      theme = prefersDark ? "dark" : "light"
    }
    document.documentElement.classList.add(theme)
    document.getElementById("hljs-theme").href = `css/github${theme === "dark" ? "-dark" : ""}.css`
  </script>

  <!-- Application scripts -->
  <script type="module" src="js/MDV.js"></script>
</head>

<body class="app-container">

  <header id="app-header">

    <div id="titlebar">
      <div id="titlebar-left">
      </div>

      <p id="titlebar-title">mdv</p>

      <div id="titlebar-right">
        <span class="toolbutton">
          <button id="action-open-button" class="cursor-pointer btn btn-action">
            <i class="codicon codicon-file-text"></i>
            Open
          </button>
        </span>
        <span class="toolbutton">
          <button id="action-config-button" class="cursor-pointer btn btn-action">
            <i class="codicon codicon-settings"></i>
          </button>
        </span>

        <span class="toolsep"></span>

        <span class="toolbutton">
          <button id="action-minimize" class="btn btn-action btn-window">
            <i class="codicon codicon-chrome-minimize"></i>
          </button>
        </span>
        <span class="toolbutton">
          <button id="action-restore" class="btn btn-action btn-window">
            <i class="codicon codicon-chrome-restore"></i>
          </button>
        </span>
        <span class="toolbutton">
          <button id="action-maximize" class="btn btn-action btn-window">
            <i class="codicon codicon-chrome-maximize"></i>
          </button>
        </span>
        <span class="toolbutton">
          <button id="action-close" class="btn btn-action btn-window close">
            <i class="codicon codicon-chrome-close"></i>
          </button>
        </span>
      </div>
    </div>

  </header>

  <main id="mainView">
    <section id="watermark" class="watermark">
      <svg id="plusIcon" class="watermark-icon" viewBox="0 0 24 24" fill="none" stroke="var(--color-pink-500)"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14" />
      </svg>
      <p class="watermark-text">Drop a Markdown file here or click Open</p>
    </section>
    <section id="stage">
    </section>
  </main>

  <footer id="app-footer">
    <div id="statusbar">
      <div id="statusbar-left">
      </div>
      <div id="statusbar-right">
        <div id="filename"><em>No file open.</em></div>

      </div>
    </div>
  </footer>

</body>

</html>
