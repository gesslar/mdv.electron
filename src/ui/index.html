<!DOCTYPE html>
<html lang="en" class="h-full forced-color-adjust-auto">

<head>
  <meta charset="UTF-8">
  <title>mdv like a mofo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="manifest" href="assets/icons/site.webmanifest">

  <script>
    // Apply theme immediately to prevent flash
    const saved = localStorage.getItem("mdv-theme") || "auto"
    let theme
    if (saved === "light" || saved === "dark") {
      theme = saved
    } else {
      // Resolve "auto" based on system preference
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
      theme = prefersDark ? "dark" : "light"
    }
    document.documentElement.classList.add(theme)

    // Set hljs theme immediately too
    const hljsTheme = document.getElementById("hljs-theme")
    if (hljsTheme) {
      hljsTheme.href = `css/github${theme === "dark" ? "-dark" : ""}.css`
    }
  </script>

  <link rel="stylesheet" href="css/mdv.css">
  <link id="hljs-theme" rel="stylesheet" href="css/github-dark.css">

  <!-- Application scripts -->
  <script type="module" src="js/MDV.js"></script>
</head>

<body class="app-container">

  <header id="app-header">

    <nav id="toolbar">
      <div id="toolbar-left">
        <span class="toolbutton">
          <button id="action-open-button" class="cursor-pointer btn btn-action">
            <i class="codicon codicon-file-text"></i>
            Open
          </button>
        </span>
      </div>

      <div id="toolbar-right">
        <span class="toolbutton">
          <button id="action-config-button" class="cursor-pointer btn btn-action">
            <i class="codicon codicon-settings"></i>
          </button>
        </span>
      </div>
    </nav>

    <div id="nav-buffer"></div>

  </header>

  <main id="mainView" id="app-main">
    <section id="watermark" class="watermark">
      <svg id="plusIcon" class="watermark-icon" viewBox="0 0 24 24" fill="none" stroke="var(--color-pink-500)"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14" />
      </svg>
      <p class="watermark-text">Drop a Markdown file here or click Open</p>
    </section>
    <section id="stage">
    </section>
  </main>

  <footer id="app-footer">
    <div id="statusbar">
      <div id="statusbar-left">
      </div>
      <div id="statusbar-right">
        <div id="filename"><em>No file open.</em></div>

      </div>
    </div>
  </footer>

</body>

</html>
