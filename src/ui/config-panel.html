<div id="config-panel-content">
  <section id="config-actions">
    <button role="button" aria-label="Close" id="close-config" type="button"
      class="config-close-button btn btn-secondary">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="config-close-icon">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
      </svg>
    </button>
  </section>
  <section id="config-content">
    <ul role="list" id="config-list">
      <li class="config-list-item">
        <section id="config-theme">
          <section class="config-section-header">
            <h2 class="config-section-title">Theme</h2>
          </section>
          <section class="config-section-content">
            <ul class="button-group-horizontal">
              <li id="btn-auto" aria-label="Auto" role="button" type="button" class="button button-group-item">
                Auto
              </li>

              <li id="btn-light" aria-label="Light" role="button" type="button" class="button button-group-item">
                Light
              </li>

              <li id="btn-dark" aria-label="Dark" role="button" type="button" class="button button-group-item">
                Dark
              </li>
            </ul>
          </section>
        </section>
      </li>
      <li class="config-list-item">
        <section id="config-hot-reload">
          <section class="config-section-header">
            <div class="config-section-title">Hot Reload</div>
          </section>
          <section class="config-section-content">
            <ul class="button-group-horizontal">
              <li id="btn-reload-on" aria-label="On" role="button" type="button" class="button button-group-item">
                On
              </li>

              <li id="btn-reload-off" aria-label="Off" role="button" type="button" class="button button-group-item">
                Off
              </li>
            </ul>
          </section>
        </section>
      </li>
    </ul>
  </section>
</div>
